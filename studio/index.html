<!doctype html>
<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Studio</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <div class="site-shell">

        <nav class="nav">
          <a href="/">site</a>
          <a href="#" id="newPost">new</a>

      <main id="studioRoot"></main>

        <span>local only</span>

    <script src="/studio/client.js"></script>
